[usrp]
args = serial=DEADBEEF
sync = host

[shmem]
mount_desc = /dev/shm
mount_ring = /dev/shm
size_desc_mib = 2
size_ring_mib = 1024

[rx]
subdev = A:A
antenna = RX2
bandwidth = 32e6
freq_rf = 3.75e9
freq_dsp = 0.
gain = 0.
rate = 40e6

[tx]
file = tx_signal.cint16.bin
subdev = A:A
antenna = RX/TX
bandwidth = 32e6
freq_rf = 3.75e9
freq_dsp = 0.
gain = 0.
rate = 40e6

[wr]
directory = /tmp
