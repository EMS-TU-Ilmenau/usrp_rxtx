[usrp]
args = addr=192.168.30.2,second_addr=192.168.40.2
sync = host

[shmem]
mount_desc = /dev/shm
mount_ring = /dev/shm
size_desc_mib = 2
size_ring_mib = 1024

[rx]
subdev = A:0 B:0
antenna = RX2
rate = 200e6
freq_rf = 3.75e9
freq_dsp = 0.
gain = 0.

[tx]
file = tx_signal.cint16.bin
subdev = A:0 B:0
antenna = TX/RX
rate = 200e6
freq_rf = 3.75e9
freq_dsp = 0.
gain = 0.

[wr]
directory = /tmp
