#
# SET DYNAMICS MODEL
#
# Sets contraints for dynamics of receiver to improve navigation solution
# accuracy. May have opposite effect if wrong model is applied. Use default
# if unsure. Possible values:
#   *  0: Portable (default)
#   *  2: Stationary
#   *  3: Pedestrian
#   *  4: Automotive
#   *  5: Sea
#   *  6: Airborne <1g
#   *  7: Airborne <2g
#   *  8: Airborne <4g
#   *  9: Wrist-worn watch (not available in all products)
#   * 10: Motorbike (not available in all products)
#   * 11: Robotic lawn mower (not available in all products)
#   * 12: E-scooter (not available in all products)
#
# See ZED-F9P integration manual for details:
# https://www.u-blox.com/en/docs/UBX-18010802#page=22
#

# CFG-NAVSPG-DYNMODEL (default: 0x00)
0x20110021 = 0


#
# SET TRI GNSS MODE (GPS + GLONASS + GALILEO) ON BOTH BANDS
#
# The ZED-F9P defaults to having everything enabled except for the BeiDou B2
# frequency band. This configuration file assumes that the F9P is using its
# defaults and disables Beidou and QZSS to achieve tri GNSS RTK with 10 Hz
# update rate. See rate configuration below for details.
# Additionally, SBAS is disabled to prevent the receiver from falling back to
# SBAS corrections during RTCM outage, which may result in position jumps when
# the correction source is switched.
# NOTE: According to the integration manual all systems and bands are enabled
#       by default: https://www.u-blox.com/en/docs/UBX-18010802#page=10
#
# See datasheet for table of possible rates depending on GNSS configuration:
# https://www.u-blox.com/en/docs/UBX-17051259#page=4
#

# CFG-SIGNAL-GPS_ENA (default: 1)
0x1031001f = 1
# CFG-SIGNAL-GPS_L1CA_ENA (default: 1)
0x10310001 = 1
# CFG-SIGNAL-GPS_L2C_ENA (default: 1)
0x10310003 = 1
# CFG-SIGNAL-SBAS_ENA (default: 1)
0x10310020 = 0
# CFG-SIGNAL-SBAS_L1CA_ENA (default: 1)
0x10310005 = 0
# CFG-SIGNAL-GAL_ENA (default: 1)
0x10310021 = 1
# CFG-SIGNAL-GAL_E1_ENA (default: 1)
0x10310007 = 1
# CFG-SIGNAL-GAL_E5B_ENA (default: 1)
0x1031000a = 1
# CFG-SIGNAL-BDS_ENA (default: 1)
0x10310022 = 0
# CFG-SIGNAL-BDS_B1_ENA (default: 1)
0x1031000d = 0
# CFG-SIGNAL-BDS_B2_ENA (default: 1)
0x1031000e = 0
# CFG-SIGNAL-QZSS_ENA (default: 1)
0x10310024 = 0
# CFG-SIGNAL-QZSS_L1CA_ENA (default: 1)
0x10310012 = 0
# CFG-SIGNAL-QZSS_L2C_ENA (default: 1)
0x10310015 = 0
# CFG-SIGNAL-GLO_ENA (default: 1)
0x10310025 = 1
# CFG-SIGNAL-GLO_L1_ENA (default: 1)
0x10310018 = 1
# CFG-SIGNAL-GLO_L2_ENA (default: 1)
0x1031001a = 1


#
# CONFIGURE MEASUREMENT AND NAVIGATION RATE
#
# CFG-RATE-MEAS determines the interval (i.e., inverse of rate in Hz) between
# raw GNSS measurement in milliseconds. The raw measurement data can be output
# via the UBX-RXM-RAWX message at the same rate (set CFG-MSGOUT-UBX_RXM_RAWX_*
# to 1). However, navigation solutions can not be computed at the same rate as
# the maximum measurement rate. CFG-RATE-NAV serves as integer divisor of the
# measurement rate and determines the frequency of navigation solutions and
# the maximum output rate of navigation messages (e.g., NAV-PVT).
#
# In quad GNSS configuration, the ZED-F9P supports 20 Hz raw measurement rate
# and can compute position, velocity, and time (PVT) solutions at 10 Hz.
# However, RTK solutions with quad GNSS are limited to 8 Hz, while in tri GNSS
# mode (GPS+GLO+GAL) up to 10 Hz are possible.
#
# See datasheet and interface description of UBX-CFG-RATE message for details:
# https://www.u-blox.com/en/docs/UBX-17051259#page=4
# https://www.u-blox.com/en/docs/UBX-18010854#page=83
#

# Configure measurement and navigation rate to 10 Hz. For RTK operation this
# requires tri GNSS mode.

# CFG-RATE-MEAS (default: 0x03e8)
0x30210001 = 100
# CFG-RATE-NAV (default: 0x0001)
0x30210002 = 1


#
# ENABLE SELECTION OF UBX MESSAGES FOR PERIODIC OUTPUT ON USB
#
# The value is designated "output rate" by the integration manual. However, that
# denomination is deceptive, because the value actually determines the message
# generation period. The highest output frequency (i.e., Hertz) is achieved by
# value 1. Larger values reduce the output frequency.
#
# The interval of UBX-NAV-* messages is determined by the navigation epoch,
# i.e., the rate of navigation solutions configured above via CFG-RATE-MEAS and
# CFG-RATE-NAV. The maximum interval of periodic non-navigation messages is one
# per second. However, some messages are event-specific, e.g., UBX-RXM-RTCM, and
# are output only if the related event occurs. The interface description does
# not specify the effect of setting values other than one for these messages, so
# assume that is undefined behavior.
#
# See the interface description for details on each message:
# https://www.u-blox.com/en/docs/UBX-18010854#page=41
#

# CFG-MSGOUT-UBX_MON_COMMS_USB (default: 0x00)
0x20910352 = 1
# CFG-MSGOUT-UBX_MON_RF_USB (default: 0x00)
